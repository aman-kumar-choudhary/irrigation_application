name: jaldrishti
description: Crop-Based Irrigation Dashboard for Udham Singh Nagar
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  
  # Maps & Location
  flutter_map: ^6.1.0
  geolocator: ^10.1.0
  latlong2: ^0.9.0
  
  # Networking
  dio: ^5.4.0
  http: ^1.6.0
  connectivity_plus: ^5.0.2
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Date & Time
  intl: ^0.18.1
  table_calendar: ^3.0.9
  
  # Utils
  url_launcher: ^6.2.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  
  # ── ASSETS ─────────────────────────────────────────────────────────
  assets:
    # Icons / Logos
    - assets/icons/
    - assets/icons/iirs.png
    - assets/icons/isro.png
    - assets/icons/india.png
    
    # Images
    - assets/images/
    - assets/images/BG.png
    - assets/images/about.png
    - assets/images/barley.png
    - assets/images/cwr.jpeg
    - assets/images/kc.jpg
    - assets/images/wheat.png
 
